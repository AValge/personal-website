<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>AValge.dev | Projects</title>
      <link rel="icon" type="image/x-icon" href="/images/avalge_icon2.ico">
      <link rel="stylesheet" href="/stylesheets/projects.css" />
    </head>
    <body> 
      <div id="stars"></div>
      <div class="title">
        <h1>Projects</h1>
        <h2>This is a collection of my personal projects</h2>
      </div>
      <div class="container">
        <div class="left-column">
          <div>Minecraft</div>
        <div class="right-column">
      </div>
      <footer>
        <p>avalge.dev</p>
        <p>&copy; AValge 2026</p>  
      </footer>
      <script>
        const space = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
          const star = document.createElement('div');
          star.classList.add('star');
          const size = Math.random() * 2.5 + 0.5;
          star.style.cssText = `
              width: ${size}px;
              height: ${size}px;
              left: ${Math.random() * 100}%;
              top: ${Math.random() * 100}%;
              --duration: ${Math.random() * 3 + 1.5}s;
              --delay: ${Math.random() * 4}s;
          `;
          space.appendChild(star);
      }
      </script>
    </body>
  </html>
</html>
